<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrel Monkey Skull</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #compare-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }
        #compare-btn:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateX(-50%) translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.4);
        }
        #compare-btn:active {
            transform: translateX(-50%) translateY(0px);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px 50px;
            border-radius: 10px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="loading">Loading model...</div>
    <button id="compare-btn">Add a human skull for comparison</button>
    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        let scene, camera, renderer, controls;
        let humanSkullLoaded = false;
        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        const compareBtn = document.getElementById('compare-btn');

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            // Camera
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0, 50);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 10;
            controls.maxDistance = 200;

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight1.position.set(1, 1, 1);
            scene.add(directionalLight1);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight2.position.set(-1, -1, -1);
            scene.add(directionalLight2);

            const pointLight = new THREE.PointLight(0xffffff, 0.5);
            pointLight.position.set(0, 10, 10);
            scene.add(pointLight);

            // Load texture
            const textureLoader = new THREE.TextureLoader();
            const texture = textureLoader.load('textures/squirrel monkey 357.06.png');

            // Load Squirrel Monkey Skull
            const loader = new OBJLoader();
            loader.load(
                'squirrel_mokey_skull.obj',
                function (object) {
                    // Material with texture
                    const material = new THREE.MeshPhongMaterial({
                        map: texture,
                        shininess: 30,
                        flatShading: false
                    });

                    // Apply material to all meshes
                    object.traverse(function (child) {
                        if (child instanceof THREE.Mesh) {
                            child.material = material;
                        }
                    });

                    // Center the model without scaling (preserve OBJ scale)
                    const box = new THREE.Box3().setFromObject(object);
                    const center = box.getCenter(new THREE.Vector3());

                    object.position.sub(center);
                    object.position.x -= 20; // Move to the left

                    // Rotate 180 degrees around Y axis
                    object.rotation.y = Math.PI;

                    scene.add(object);
                    loading.style.display = 'none';
                },
                function (xhr) {
                    const percentComplete = (xhr.loaded / xhr.total) * 100;
                    loading.textContent = `Loading model... ${Math.round(percentComplete)}%`;
                },
                function (error) {
                    console.error('Error loading model:', error);
                    loading.textContent = 'Error loading model. Check console for details.';
                }
            );

            // Button to load human skull
            compareBtn.addEventListener('click', function() {
                if (humanSkullLoaded) return;

                compareBtn.textContent = 'Loading human skull...';
                compareBtn.disabled = true;

                loader.load(
                    'HumanSkull.obj',
                    function (object) {
                        // Material for human skull
                        const material = new THREE.MeshPhongMaterial({
                            color: 0xe8e8e8,
                            shininess: 30,
                            flatShading: false
                        });

                        // Apply material to all meshes
                        object.traverse(function (child) {
                            if (child instanceof THREE.Mesh) {
                                child.material = material;
                            }
                        });

                        // Scale up the human skull 10x and center it
                        object.scale.multiplyScalar(17);

                        const box = new THREE.Box3().setFromObject(object);
                        const center = box.getCenter(new THREE.Vector3());

                        object.position.sub(center);
                        object.position.z -= 110; // Move further to the right

                        scene.add(object);
                        humanSkullLoaded = true;
                        compareBtn.style.display = 'none';
                    },
                    function (xhr) {
                        const percentComplete = (xhr.loaded / xhr.total) * 100;
                        compareBtn.textContent = `Loading human skull... ${Math.round(percentComplete)}%`;
                    },
                    function (error) {
                        console.error('Error loading human skull:', error);
                        compareBtn.textContent = 'Error loading human skull';
                        compareBtn.disabled = false;
                    }
                );
            });

            // Handle window resize
            window.addEventListener('resize', onWindowResize, false);

            // Start animation loop
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
