<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrel Monkey Skull — 3D Specimen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0e12;
            --ink: #ece7df;
            --muted: #8a8578;
            --accent: #c9a45c;
            --line: rgba(201, 164, 92, 0.35);
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--ink);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        #canvas-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
        }
        /* subtle vignette over the canvas */
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
        }

        /* ---- Title plate ---- */
        #titleplate {
            position: fixed;
            top: 32px;
            left: 36px;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transform: translateY(-8px);
            animation: rise 1.1s 0.2s cubic-bezier(.2,.7,.2,1) forwards;
        }
        #titleplate .eyebrow {
            font-size: 11px;
            letter-spacing: 0.42em;
            text-transform: uppercase;
            color: var(--accent);
            margin: 0 0 10px;
            font-weight: 400;
        }
        #titleplate h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: clamp(30px, 5vw, 54px);
            line-height: 0.98;
            margin: 0;
            letter-spacing: 0.01em;
        }
        #titleplate .latin {
            font-style: italic;
            color: var(--muted);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(15px, 2vw, 20px);
            margin-top: 6px;
        }
        #titleplate .rule {
            width: 54px;
            height: 1px;
            background: var(--line);
            margin: 16px 0 0;
        }

        /* ---- Hint (bottom-left) ---- */
        #hint {
            position: fixed;
            bottom: 30px;
            left: 36px;
            z-index: 20;
            font-size: 12px;
            letter-spacing: 0.06em;
            color: var(--muted);
            display: flex;
            gap: 18px;
            align-items: center;
            opacity: 0;
            animation: rise 1.1s 0.6s cubic-bezier(.2,.7,.2,1) forwards;
        }
        #hint span { display: inline-flex; align-items: center; gap: 7px; }
        #hint b {
            color: var(--ink);
            font-weight: 500;
            border: 1px solid rgba(236,231,223,0.18);
            border-radius: 5px;
            padding: 2px 8px;
            font-size: 11px;
        }

        /* ---- Compare button ---- */
        #compare-btn {
            position: fixed;
            bottom: 30px;
            right: 36px;
            z-index: 30;
            background: transparent;
            color: var(--ink);
            border: 1px solid var(--line);
            padding: 14px 26px;
            border-radius: 2px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            overflow: hidden;
            transition: color .35s ease, border-color .35s ease;
            opacity: 0;
            animation: rise 1.1s 0.8s cubic-bezier(.2,.7,.2,1) forwards;
        }
        #compare-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: translateY(101%);
            transition: transform .4s cubic-bezier(.2,.7,.2,1);
            z-index: -1;
        }
        #compare-btn:hover:not(:disabled) {
            color: #14130f;
            border-color: var(--accent);
        }
        #compare-btn:hover:not(:disabled)::before { transform: translateY(0); }
        #compare-btn:disabled { cursor: default; color: var(--muted); }
        #compare-btn .dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 9px;
            vertical-align: middle;
            transition: background .35s ease;
        }
        #compare-btn:hover:not(:disabled) .dot { background: #14130f; }

        /* ---- Loading overlay ---- */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            background: var(--bg);
            transition: opacity .8s ease, visibility .8s ease;
        }
        #loading.hidden { opacity: 0; visibility: hidden; }
        #loading .label {
            font-size: 11px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--muted);
        }
        #loading .pct {
            font-family: 'Cormorant Garamond', serif;
            font-size: 64px;
            font-weight: 500;
            line-height: 1;
            color: var(--ink);
            font-variant-numeric: tabular-nums;
        }
        #bar {
            width: min(260px, 60vw);
            height: 1px;
            background: rgba(236,231,223,0.14);
            position: relative;
            overflow: hidden;
        }
        #bar i {
            position: absolute;
            inset: 0 100% 0 0;
            background: var(--accent);
            transition: right .25s ease;
        }

        /* ---- Credit (top-right) ---- */
        #credit {
            position: fixed;
            top: 34px;
            right: 36px;
            z-index: 20;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            text-decoration: none;
            color: var(--muted);
            font-size: 13px;
            letter-spacing: 0.08em;
            opacity: 0;
            animation: rise 1.1s 1s cubic-bezier(.2,.7,.2,1) forwards;
            transition: color .3s ease;
        }
        #credit:hover { color: var(--ink); }
        #credit .logo {
            width: 20px;
            height: auto;
            display: block;
        }
        #credit .logo path { fill: currentColor; }
        #credit .name {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 19px;
            color: var(--ink);
            letter-spacing: 0;
        }

        @keyframes rise {
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 600px) {
            #titleplate { top: 20px; left: 20px; }
            #titleplate h1 { font-size: 30px; }
            #titleplate .latin { font-size: 15px; }
            #titleplate .rule { margin-top: 12px; }
            #credit { top: 22px; right: 20px; font-size: 12px; gap: 7px; }
            #credit .logo { width: 17px; }
            #credit .name { font-size: 17px; }
            #hint {
                left: 20px; right: 20px; bottom: 76px;
                justify-content: center; gap: 22px;
            }
            #compare-btn {
                left: 20px; right: 20px; bottom: 20px;
                text-align: center; padding: 15px 20px;
            }
            #loading .pct { font-size: 48px; }
        }
        /* Landscape phones / very short screens: keep chrome compact */
        @media (max-height: 480px) {
            #titleplate h1 { font-size: 26px; }
            #hint { display: none; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="label">Loading</div>
        <div class="pct"><span id="pct-num">0</span>%</div>
        <div id="bar"><i id="bar-fill"></i></div>
    </div>

    <div id="titleplate">
        <h1>Squirrel Monkey<br>Skull</h1>
        <div class="latin">Saimiri sciureus</div>
        <div class="rule"></div>
    </div>

    <div id="hint">
        <span><b>Drag</b> rotate</span>
        <span><b>Scroll</b> zoom</span>
    </div>

    <a id="credit" href="https://lev.la" target="_blank" rel="noopener">
        <span>by</span>
        <svg class="logo" viewBox="24 77 162 52" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g transform="translate(-5.3141785,-47.353546)">
                <path d="m 30.846649,174.00728 c 45.163303,0 33.903929,-0.22464 53.827615,-0.22464 23.917306,0 20.747086,-38.28407 43.326346,-38.28407 h 43.46291 c 10.39006,0 9.56556,-9.65916 9.56556,-9.65916 h -59.36334 c -21.20021,0 -21.47979,38.33882 -41.312555,38.33882 H 43.39276 c -10.879268,0 -12.546111,9.82905 -12.546111,9.82905 z" />
                <path style="opacity:0.5" d="M 111.88373,125.90754 H 47.921437 c -7.698258,0 -10.662542,9.19665 -10.662542,9.19665 h 65.804265 c 0,0 0.92169,-2.34024 3.0781,-4.95179 2.04554,-2.47729 5.74247,-4.24486 5.74247,-4.24486 z" />
            </g>
        </svg>
        <span class="name">lev</span>
    </a>

    <button id="compare-btn"><span class="dot"></span>Add human skull</button>
    <div id="canvas-container"></div>
    <div id="vignette"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        let scene, camera, renderer, controls;
        let humanSkullLoaded = false;
        let userInteracted = false;
        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        const compareBtn = document.getElementById('compare-btn');
        const pctNum = document.getElementById('pct-num');
        const barFill = document.getElementById('bar-fill');

        function setProgress(p) {
            const v = Math.max(0, Math.min(100, Math.round(p)));
            pctNum.textContent = v;
            barFill.style.right = (100 - v) + '%';
        }

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0d0e12);

            // Camera
            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0, 50);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 10;
            // Large enough to frame the 17×-scaled human skull beside the
            // squirrel one without the fit distance being clamped.
            controls.maxDistance = 900;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.6;
            controls.addEventListener('start', function () {
                userInteracted = true;
                controls.autoRotate = false;
            });

            // Lights — warm key, cool fill, gold rim for a gallery feel
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xfff3e0, 1.0);
            keyLight.position.set(1, 1.2, 1);
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0x9db4d6, 0.45);
            fillLight.position.set(-1, -0.4, -0.6);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xc9a45c, 0.6);
            rimLight.position.set(-0.6, 0.5, -1.2);
            scene.add(rimLight);

            const pointLight = new THREE.PointLight(0xffffff, 0.4);
            pointLight.position.set(0, 12, 14);
            scene.add(pointLight);

            // Asset host + Draco-compressed glTF loader
            const ASSETS = 'https://assets.squirrelmonkeyskull.com';
            const textureLoader = new THREE.TextureLoader();
            const texture = textureLoader.load(ASSETS + '/textures/squirrel monkey 357.06.png');
            // glTF/Draco geometry uses top-left UV origin (obj2gltf flips V),
            // so the color map must NOT be flipped on Y to stay aligned.
            texture.flipY = false;
            texture.colorSpace = THREE.SRGBColorSpace;

            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            // Apply one material to every mesh under a glTF root
            function setMaterial(root, material) {
                root.traverse(function (child) {
                    if (child.isMesh) child.material = material;
                });
            }

            // Load Squirrel Monkey Skull (Draco GLB). Use the whole gltf.scene
            // (not a detached mesh) so obj2gltf's up-axis conversion transform
            // is preserved for correct orientation and measurement.
            loader.load(
                ASSETS + '/squirrel_mokey_skull.draco.glb',
                function (gltf) {
                    const object = gltf.scene;
                    object.updateMatrixWorld(true);
                    setMaterial(object, new THREE.MeshPhongMaterial({
                        map: texture,
                        shininess: 30,
                        flatShading: false
                    }));

                    // Center the model without scaling (preserve scale)
                    const box = new THREE.Box3().setFromObject(object);
                    const center = box.getCenter(new THREE.Vector3());

                    object.position.sub(center);
                    object.position.x -= 20; // Move to the left
                    object.rotation.y = Math.PI; // face forward

                    scene.add(object);
                    object.updateMatrixWorld(true);
                    // Remember the squirrel skull (and its bounds) so the human
                    // one can be placed neatly beside it for comparison.
                    squirrelObject = object;
                    squirrelBox = new THREE.Box3().setFromObject(object);
                    setProgress(100);
                    loading.classList.add('hidden');

                    // Frame the specimen nicely on a raised 3/4 angle while
                    // the gentle auto-rotate continues until the user grabs it.
                    if (!userInteracted) frameSceneObjects({ heroAngle: true, pad: 1.15, dur: 1.4 });

                    // Warm the human-skull asset in the background so the
                    // comparison appears instantly when requested.
                    preloadHumanSkull();
                },
                function (xhr) {
                    if (xhr.lengthComputable) setProgress((xhr.loaded / xhr.total) * 100);
                },
                function (error) {
                    console.error('Error loading model:', error);
                    loading.querySelector('.label').textContent = 'Failed to load specimen';
                }
            );

            // ---- Human skull: preload in background, add on click ----
            let humanGltf = null;        // cached parsed model
            let humanPromise = null;     // in-flight load
            let squirrelObject = null;   // the squirrel skull root
            let squirrelBox = null;      // world bounds of the squirrel skull

            function preloadHumanSkull() {
                if (humanPromise) return humanPromise;
                humanPromise = new Promise(function (resolve, reject) {
                    loader.load(
                        ASSETS + '/HumanSkull.draco.glb',
                        function (gltf) { humanGltf = gltf; resolve(gltf); },
                        undefined,
                        reject
                    );
                });
                return humanPromise;
            }

            function addHumanSkull(gltf) {
                // Turn both skulls to face the camera (perpendicular to the
                // left-right line between them) so they read as two specimens
                // side by side rather than nose-to-tail / one behind the other.
                if (squirrelObject) {
                    squirrelObject.rotation.y = Math.PI / 2;
                    squirrelObject.updateMatrixWorld(true);
                    squirrelBox = new THREE.Box3().setFromObject(squirrelObject);
                }

                const object = gltf.scene;
                object.rotation.y = -Math.PI / 2; // face the camera
                object.updateMatrixWorld(true);
                setMaterial(object, new THREE.MeshPhongMaterial({
                    color: 0xe8e8e8,
                    shininess: 30,
                    flatShading: false
                }));

                // Scale the human skull relative to the (measured) squirrel
                // skull for a faithful, anatomically-plausible comparison —
                // a human skull is ~3.5× the linear size of a squirrel monkey's.
                const rawSize = new THREE.Box3().setFromObject(object).getSize(new THREE.Vector3());
                const rawLongest = Math.max(rawSize.x, rawSize.y, rawSize.z) || 1;
                let scaleFactor = 17; // fallback if squirrel bounds unknown
                if (squirrelBox) {
                    const sq = squirrelBox.getSize(new THREE.Vector3());
                    const sqLongest = Math.max(sq.x, sq.y, sq.z);
                    scaleFactor = (sqLongest * 3.5) / rawLongest;
                }
                object.scale.setScalar(scaleFactor);
                object.updateMatrixWorld(true);

                // Place beside the squirrel skull using measured box EDGES
                // (axis-agnostic, since the up-axis conversion may permute
                // axes): human's left edge sits a gap right of the squirrel's
                // right edge, bottoms aligned, centered in depth.
                if (squirrelBox) {
                    const hb = new THREE.Box3().setFromObject(object);
                    const sqW = squirrelBox.max.x - squirrelBox.min.x;
                    const gap = sqW * 0.6;
                    // human's left edge a gap right of the squirrel's right edge
                    const dx = (squirrelBox.max.x + gap) - hb.min.x;
                    // align vertical CENTERS (same eye level) so they read as
                    // side by side rather than one sunk below the other
                    const dy = (squirrelBox.min.y + squirrelBox.max.y) / 2
                             - (hb.min.y + hb.max.y) / 2;
                    // align depth centers so neither sits in front of the other
                    const dz = (squirrelBox.min.z + squirrelBox.max.z) / 2
                             - (hb.min.z + hb.max.z) / 2;
                    object.position.add(new THREE.Vector3(dx, dy, dz));
                } else {
                    object.position.z -= 110;
                }
                object.updateMatrixWorld(true);

                scene.add(object);
                humanSkullLoaded = true;
                compareBtn.disabled = true;
                compareBtn.innerHTML = '<span class="dot"></span>Comparing both';

                // Pan/zoom (from the front) so both skulls sit fully in frame
                frameSceneObjects({ frontAngle: true, pad: 1.05, stopAutoRotate: true, dur: 1.3 });

                // Constrain the orbit in comparison mode: the two skulls are
                // separated along X, so a full side/top orbit would line them
                // up front-to-back and read as "one behind the other". Keep the
                // camera near eye level and roughly frontal so the side-by-side
                // layout always reads. (The single skull keeps free rotation.)
                const d2r = THREE.MathUtils.degToRad;
                controls.minPolarAngle = d2r(62);
                controls.maxPolarAngle = d2r(104);
                controls.minAzimuthAngle = d2r(-68);
                controls.maxAzimuthAngle = d2r(68);
            }

            // Button to load human skull
            compareBtn.addEventListener('click', function() {
                if (humanSkullLoaded) return;
                compareBtn.disabled = true;

                if (humanGltf) {
                    addHumanSkull(humanGltf);
                    return;
                }
                compareBtn.innerHTML = '<span class="dot"></span>Loading human skull…';
                preloadHumanSkull().then(addHumanSkull).catch(function (error) {
                    console.error('Error loading human skull:', error);
                    compareBtn.innerHTML = '<span class="dot"></span>Error — retry';
                    compareBtn.disabled = false;
                });
            });

            // Handle window resize
            window.addEventListener('resize', onWindowResize, false);

            // Start animation loop
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ---- Smooth camera framing ----
        let camTween = null;
        function frameSceneObjects(opts) {
            opts = opts || {};
            const pad = opts.pad || 1.5;
            // Bounding box of every mesh currently in the scene
            const box = new THREE.Box3();
            scene.traverse(function (child) {
                if (child.isMesh) box.expandByObject(child);
            });
            if (box.isEmpty()) return;

            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            // Fit the box's bounding sphere within the smaller (vertical vs
            // horizontal) field of view so nothing ever crops, regardless of
            // viewing angle or screen aspect.
            const radius = 0.5 * Math.sqrt(size.x * size.x + size.y * size.y + size.z * size.z);
            const vfov = camera.fov * (Math.PI / 180);
            const aspect = camera.aspect || (window.innerWidth / window.innerHeight);
            const hfov = 2 * Math.atan(Math.tan(vfov / 2) * aspect);
            const fit = Math.min(vfov, hfov);
            let dist = radius / Math.sin(fit / 2);
            dist *= pad;
            dist = Math.min(dist, controls.maxDistance);

            // Preferred viewing direction (slightly raised 3/4 hero angle on
            // the initial fit; otherwise keep the current orbit direction).
            let dir;
            if (opts.heroAngle) {
                dir = new THREE.Vector3(0.25, 0.12, 1).normalize();
            } else if (opts.frontAngle) {
                dir = new THREE.Vector3(0.04, 0.06, 1).normalize();
            } else {
                dir = new THREE.Vector3()
                    .subVectors(camera.position, controls.target)
                    .normalize();
                if (dir.lengthSq() === 0) dir.set(0, 0, 1);
            }
            const camTarget = center.clone().add(dir.multiplyScalar(dist));

            // Pause auto-rotate during the tween so it doesn't fight the lerp;
            // resume afterwards unless this fit should end it (or user grabbed).
            const wasAutoRotating = controls.autoRotate;
            controls.autoRotate = false;
            camTween = {
                fromPos: camera.position.clone(),
                toPos: camTarget,
                fromTarget: controls.target.clone(),
                toTarget: center,
                t: 0,
                dur: opts.dur || 1.1,
                resumeAutoRotate: wasAutoRotating && !opts.stopAutoRotate
            };
        }

        const clock = new THREE.Clock();
        function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (camTween) {
                camTween.t = Math.min(1, camTween.t + dt / camTween.dur);
                const e = easeInOut(camTween.t);
                camera.position.lerpVectors(camTween.fromPos, camTween.toPos, e);
                controls.target.lerpVectors(camTween.fromTarget, camTween.toTarget, e);
                if (camTween.t >= 1) {
                    if (camTween.resumeAutoRotate && !userInteracted) controls.autoRotate = true;
                    camTween = null;
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // On touch devices, "Scroll to zoom" → "Pinch to zoom"
        if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) {
            const hintLabels = document.querySelectorAll('#hint b');
            if (hintLabels[1]) hintLabels[1].textContent = 'Pinch';
        }

        init();
    </script>
</body>
</html>
